<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vault Crypt | Secure Plain-Text XOR</title>
  <style>
    :root {
      --bg-color: #0b0b0b;
      --card-bg: #1e1e1e;
      --accent-blue: #0078d4;
      --accent-hover: #005a9e;
      --text-main: #ffffff;
      --text-dim: #a1a1a1;
      --border-color: #333333;
      --error-red: #ff5f5f;
    }

    body { 
      font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
      margin: 0; background-color: var(--bg-color); color: var(--text-main);
      display: flex; flex-direction: column; align-items: center;
      min-height: 100vh; padding: 40px 20px; box-sizing: border-box;
    }

    h1 { 
      font-weight: 600; letter-spacing: -0.5px; margin-bottom: 20px;
      background: linear-gradient(90deg, #fff, #888);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }

    #keyModal {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.95); display: flex; align-items: center;
      justify-content: center; z-index: 1000; display: none;
    }
    .modal-content {
      background: var(--card-bg); border: 1px solid var(--border-color);
      padding: 40px; border-radius: 16px; text-align: center; width: 90%; max-width: 400px;
    }
    .modal-content input {
      background: #121212; border: 1px solid var(--border-color);
      color: white; padding: 12px; border-radius: 8px; width: 100%;
      font-size: 1.2rem; text-align: center; margin: 20px 0; box-sizing: border-box;
    }

    .toggle-buttons { 
      background: var(--card-bg); padding: 6px; border-radius: 12px;
      border: 1px solid var(--border-color); margin-bottom: 30px;
      display: flex; gap: 5px;
    }
    .toggle-buttons button {
      background: transparent; border: none; color: var(--text-dim);
      padding: 10px 24px; cursor: pointer; border-radius: 8px;
      font-weight: 500; transition: all 0.2s ease;
    }
    .toggle-buttons button.active { background: var(--accent-blue); color: white; }

    .section { 
      background: var(--card-bg); border: 1px solid var(--border-color);
      padding: 30px; border-radius: 16px; width: 100%; max-width: 600px;
      display: none; box-sizing: border-box;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }

    .drop-zone {
      border: 2px dashed #444; padding: 40px 20px; text-align: center;
      cursor: pointer; background: #252525; border-radius: 12px;
      transition: all 0.3s ease;
    }
    .drop-zone.dragover { border-color: var(--accent-blue); background: #2a2a2a; }

    .file-upload-wrapper { display: flex; flex-direction: column; align-items: center; gap: 10px; margin-bottom: 15px; }
    .custom-file-btn { background: #333; color: white; border: 1px solid var(--border-color); padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 0.9rem; }
    .file-name-display { font-size: 0.85rem; color: var(--accent-blue); font-style: italic; min-height: 1.2rem; }

    textarea { 
      width: 100%; height: 80px; margin-top: 15px; background: #121212;
      border: 1px solid var(--border-color); border-radius: 8px; color: #00ff41;
      padding: 12px; font-family: 'Courier New', monospace; box-sizing: border-box; resize: none;
    }

    button { background: var(--accent-blue); color: white; border: none; padding: 12px 24px; border-radius: 8px; cursor: pointer; font-weight: 600; }
    .btn-secondary { background: #333; border: 1px solid var(--border-color); }
    
    img { max-width: 100%; border-radius: 12px; margin-top: 20px; border: 1px solid var(--border-color); display: none; }
    
    #errorMsg { color: var(--error-red); font-weight: 500; margin-top: 15px; text-align: center; width: 100%;}
    .key-indicator { font-size: 0.8rem; color: var(--text-dim); margin-bottom: 15px; }

    #decResult {
        text-align: center; width: 100%; max-width: 600px;
        background: var(--card-bg); border: 1px solid var(--border-color);
        padding: 30px; border-radius: 16px; box-sizing: border-box; display: none;
    }
    
    .button-group { display: flex; justify-content: center; gap: 15px; margin-top: 20px; flex-wrap: wrap; }
  </style>
</head>
<body>

  <div id="keyModal">
    <div class="modal-content">
      <h2 style="margin-top:0">Enter Security Key</h2>
      <p style="color: var(--text-dim)">Please enter a 3 to 5 digit key</p>
      <input type="number" id="modalKeyInput" placeholder="000">
      <button onclick="setKeyFromModal()" style="width: 100%">Continue</button>
      <p id="modalError" style="color: var(--error-red); font-size: 0.8rem; margin-top: 10px;"></p>
    </div>
  </div>

  <h1>Vault Crypt</h1>
  <div class="key-indicator" id="activeKeyDisplay">Key: Loading...</div>

  <div class="toggle-buttons" id="navButtons">
    <button id="btn-enc" onclick="uiShowSection('encrypt')">Encrypt Image</button>
    <button id="btn-dec" onclick="uiShowSection('decrypt')">Decrypt Text</button>
  </div>

  <!-- Encryption Section -->
  <div class="section" id="encryptSection">
    <h2 style="margin:0 0 20px 0; font-size: 1.2rem; color: var(--text-dim);">Secure Encryption</h2>
    <div class="drop-zone" id="encDropZone">
      <p style="margin:0 0 20px 0; color: var(--text-dim);">Drag image / Click browse / Paste clipboard</p>
      <div class="file-upload-wrapper">
        <label for="encFileInput" class="custom-file-btn">Choose Image File</label>
        <input type="file" id="encFileInput" accept="image/*" style="display: none;">
        <div id="encFileName" class="file-name-display"></div>
      </div>
      <textarea id="encPasteBox" placeholder="Optional: Paste Base64 here..."></textarea>
    </div>
    <div style="text-align: center;"><img id="encPreview"></div>
    <div id="encActions" style="display: none;">
      <div class="button-group">
        <button onclick="encryptAndSave()">Encrypt & Download</button>
        <button class="btn-secondary" onclick="resetApp()">Reset</button>
      </div>
    </div>
  </div>

  <!-- Decryption Section -->
  <div class="section" id="decryptSection">
    <h2 style="margin:0 0 20px 0; font-size: 1.2rem; color: var(--text-dim);">Secure Decryption</h2>
    <div class="drop-zone" id="decDropZone">
      <p style="margin:0 0 20px 0; color: var(--text-dim);">Drop plain-text .TXT file here or browse</p>
      <div class="file-upload-wrapper">
        <label for="decFileInput" class="custom-file-btn">Choose .TXT File</label>
        <input type="file" id="decFileInput" accept=".txt" style="display: none;">
        <div id="decFileName" class="file-name-display"></div>
      </div>
      <textarea id="decPasteBox" placeholder="Or paste clean encrypted string here..."></textarea>
    </div>
    <div id="errorMsg"></div>
  </div>

  <!-- Decryption Result -->
  <div id="decResult">
    <h2 style="margin:0 0 20px 0; font-size: 1.2rem; color: var(--text-dim);">Decrypted Image</h2>
    <img id="decPreview" style="display: block; margin: 20px auto;">
    <div class="button-group">
      <button onclick="downloadDecryptedImage()">Download Image</button>
      <button class="btn-secondary" onclick="resetApp()">Process Another</button>
    </div>
  </div>

  <script>
    let KEY = ""; 
    let rawBinaryBuffer = null; // Storing raw array buffer instead of string
    let encryptedText = null;
    let originalFileName = "image";
    let originalExtension = "png";
    let targetDownloadName = "decrypted_image.png";

    window.onload = function() {
      const urlParams = new URLSearchParams(window.location.search);
      const urlKey = urlParams.get('key');
      if (urlKey && urlKey.length >= 3 && urlKey.length <= 5) {
        KEY = urlKey;
        document.getElementById("activeKeyDisplay").textContent = `Active Key: ${KEY}`;
        uiShowSection("decrypt");
      } else {
        document.getElementById("keyModal").style.display = "flex";
      }
    };

    function setKeyFromModal() {
      const val = document.getElementById("modalKeyInput").value;
      if (val.length >= 3 && val.length <= 5) {
        window.location.search = `?key=${val}`;
      } else {
        document.getElementById("modalError").textContent = "Key must be 3-5 digits.";
      }
    }

    function uiShowSection(section) {
      document.getElementById("encryptSection").style.display = (section === 'encrypt') ? "block" : "none";
      document.getElementById("decryptSection").style.display = (section === 'decrypt') ? "block" : "none";
      document.getElementById("decResult").style.display = "none";
      document.getElementById('btn-enc').classList.toggle('active', section === 'encrypt');
      document.getElementById('btn-dec').classList.toggle('active', section === 'decrypt');
    }

    function resetApp() {
      rawBinaryBuffer = null; encryptedText = null;
      document.querySelectorAll('input').forEach(i => i.value = '');
      document.querySelectorAll('textarea').forEach(t => t.value = '');
      document.querySelectorAll('.file-name-display').forEach(d => d.textContent = '');
      document.querySelectorAll('img').forEach(img => { img.src = ''; img.style.display = 'none'; });
      document.getElementById('encDropZone').style.display = 'block';
      document.getElementById('encActions').style.display = 'none';
      document.getElementById('errorMsg').textContent = '';
      uiShowSection(document.getElementById('btn-enc').classList.contains('active') ? 'encrypt' : 'decrypt');
    }

    // --- Helper Functions for Raw Binary Encryption Handling ---
    
    // Converts raw binary string to a clean Base64 string safely
    function binaryToBase64(binaryStr) {
      return btoa(binaryStr);
    }

    // Converts a Base64 string back into a raw binary string safely
    function base64ToBinary(base64Str) {
      return atob(base64Str);
    }

    // Applies XOR engine cleanly to dynamic string arrays
    function xorEngine(uint8Array, keyStr) {
      let result = "";
      for (let i = 0; i < uint8Array.length; i++) {
        let keyChar = keyStr.charCodeAt(i % keyStr.length);
        result += String.fromCharCode(uint8Array[i] ^ keyChar);
      }
      return result; // Returns binary string
    }

    function xorBinaryString(binaryStr, keyStr) {
      let result = "";
      for (let i = 0; i < binaryStr.length; i++) {
        let keyChar = keyStr.charCodeAt(i % keyStr.length);
        result += String.fromCharCode(binaryStr.charCodeAt(i) ^ keyChar);
      }
      return result;
    }

    // --- Encryption Handler ---
    const encFileInput = document.getElementById("encFileInput");
    encFileInput.addEventListener("click", () => encFileInput.value = null);
    encFileInput.addEventListener("change", e => { if (e.target.files[0]) handleImageFile(e.target.files[0]); });

    const encDropZone = document.getElementById("encDropZone");
    encDropZone.addEventListener('dragover', e => { e.preventDefault(); encDropZone.classList.add('dragover'); });
    encDropZone.addEventListener('dragleave', () => encDropZone.classList.remove('dragover'));
    encDropZone.addEventListener('drop', e => {
      e.preventDefault();
      const file = e.dataTransfer.files[0];
      if (file && file.type.startsWith('image/')) handleImageFile(file);
    });

    document.addEventListener("paste", e => {
      if (document.getElementById("encryptSection").style.display === "block") {
        const items = (e.clipboardData || e.originalEvent.clipboardData).items;
        for (let item of items) {
          if (item.type.indexOf("image") !== -1) handleImageFile(item.getAsFile());
        }
      }
    });

    function handleImageFile(file) {
      const nameOnly = file.name || "image.png";
      document.getElementById("encFileName").textContent = nameOnly;
      
      const lastDot = nameOnly.lastIndexOf('.');
      originalFileName = lastDot !== -1 ? nameOnly.substring(0, lastDot) : "image";
      originalExtension = lastDot !== -1 ? nameOnly.substring(lastDot + 1) : "png";

      // Reader 1: For the visual UI display preview setup
      const previewReader = new FileReader();
      previewReader.onload = function() {
        const preview = document.getElementById("encPreview");
        preview.src = previewReader.result;
        preview.style.display = "inline-block";
        encDropZone.style.display = "none";
        document.getElementById("encActions").style.display = "block";
      };
      previewReader.readAsDataURL(file);

      // Reader 2: Reads raw ArrayBuffer directly to execute XOR *before* base64 compilation
      const bufferReader = new FileReader();
      bufferReader.onload = function() {
        rawBinaryBuffer = new Uint8Array(bufferReader.result);
      };
      bufferReader.readAsArrayBuffer(file);
    }

    function encryptAndSave() {
      if (!rawBinaryBuffer) return;
      
      // Step 1: XOR processing directly on the image bytes
      const xorBinaryStr = xorEngine(rawBinaryBuffer, KEY);
      
      // Step 2: Convert the scrambled binary into perfectly clean Base64 plain text
      const cleanPlainTextString = binaryToBase64(xorBinaryStr);

      const cleanName = originalFileName.replace(/\./g, '_');
      const finalFileName = `${cleanName}_${originalExtension}_${KEY}.txt`;
      
      const blob = new Blob([cleanPlainTextString], { type: "text/plain" });
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = finalFileName;
      a.click();
    }

    // --- Decryption Handler ---
    const decFileInput = document.getElementById("decFileInput");
    decFileInput.addEventListener("click", () => decFileInput.value = null);
    decFileInput.addEventListener("change", e => { if (e.target.files[0]) handleDecFile(e.target.files[0]); });

    const decDropZone = document.getElementById("decDropZone");
    decDropZone.addEventListener('dragover', e => { e.preventDefault(); decDropZone.classList.add('dragover'); });
    decDropZone.addEventListener('dragleave', () => decDropZone.classList.remove('dragover'));
    decDropZone.addEventListener('drop', e => {
      e.preventDefault();
      const file = e.dataTransfer.files[0];
      if (file) handleDecFile(file);
    });

    document.getElementById("decPasteBox").addEventListener("input", e => {
      const val = e.target.value.trim();
      if (val.length > 50) {
        encryptedText = val;
        targetDownloadName = "decrypted_pasted_image.png";
        decryptAndPreview();
      }
    });

    function handleDecFile(file) {
      document.getElementById("decFileName").textContent = file.name;
      
      let raw = file.name.replace('.txt', '');
      let parts = raw.split('_');
      if (parts.length >= 3) {
          parts.pop(); 
          let ext = parts.pop(); 
          targetDownloadName = `${parts.join('_')}.${ext}`;
      } else {
          targetDownloadName = raw + ".png";
      }

      const reader = new FileReader();
      reader.onload = e => {
        encryptedText = e.target.result.trim();
        decryptAndPreview();
      };
      reader.readAsText(file);
    }

    function decryptAndPreview() {
      try {
        if (!encryptedText) return;
        
        // Step 1: Decode the pure plain text string back to raw binary data
        const binaryScrambled = base64ToBinary(encryptedText);
        
        // Step 2: Reverse the XOR processing using the symmetric Key
        const restoredBinaryStr = xorBinaryString(binaryScrambled, KEY);
        
        // Step 3: Turn the binary string into a clean UI array representation
        const bytes = new Uint8Array(restoredBinaryStr.length);
        for (let i = 0; i < restoredBinaryStr.length; i++) {
            bytes[i] = restoredBinaryStr.charCodeAt(i);
        }

        // Detect target MIME types to safely show preview images
        let ext = targetDownloadName.split('.').pop().toLowerCase();
        let mime = "image/png";
        if (ext === "jpg" || ext === "jpeg") mime = "image/jpeg";
        else if (ext === "gif") mime = "image/gif";
        else if (ext === "webp") mime = "image/webp";

        // Convert the clean array bytes back to safe rendering layout elements
        const finalBlob = new Blob([bytes], { type: mime });
        const preview = document.getElementById("decPreview");
        
        preview.src = URL.createObjectURL(finalBlob);
        
        document.getElementById("decryptSection").style.display = "none";
        document.getElementById("decResult").style.display = "block";
        document.getElementById("errorMsg").textContent = "";
      } catch (err) {
        document.getElementById("errorMsg").textContent = "Decryption Failed: Verify your key or plain text string layout integrity.";
      }
    }

    function downloadDecryptedImage() {
      const img = document.getElementById("decPreview");
      if (!img.src) return;
      const a = document.createElement("a");
      a.href = img.src;
      a.download = targetDownloadName;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
    }
  </script>
</body>
</html>
